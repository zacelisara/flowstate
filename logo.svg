<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 160" role="img" aria-label="Flowstate Solutions logo">
  <defs>
    <linearGradient id="flowDark" x1="0%" y1="55%" x2="100%" y2="35%">
      <stop offset="0%" stop-color="#071a52"/>
      <stop offset="22%" stop-color="#0b2e90"/>
      <stop offset="55%" stop-color="#1557d4"/>
      <stop offset="85%" stop-color="#3a93f1"/>
      <stop offset="100%" stop-color="#66b8ff"/>
    </linearGradient>
    <linearGradient id="flowLight" x1="0%" y1="55%" x2="100%" y2="35%">
      <stop offset="0%" stop-color="#1a63c2"/>
      <stop offset="40%" stop-color="#3ea4ec"/>
      <stop offset="75%" stop-color="#7ed3f7"/>
      <stop offset="100%" stop-color="#d4f3ff"/>
    </linearGradient>
    <linearGradient id="flowHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Lower darker wave ribbon -->
  <path d="M 12 108
           C 46 62, 98 46, 154 70
           C 188 84, 214 86, 240 76
           C 230 102, 204 118, 170 116
           C 128 114, 86 128, 52 124
           C 30 122, 16 116, 12 108 Z"
        fill="url(#flowDark)"/>

  <!-- Upper lighter wave ribbon -->
  <path d="M 44 86
           C 76 54, 128 46, 176 64
           C 202 74, 220 76, 236 70
           C 224 90, 202 100, 172 98
           C 138 96, 102 110, 76 106
           C 58 104, 48 96, 44 86 Z"
        fill="url(#flowLight)"/>

  <!-- Subtle top highlight for depth -->
  <path d="M 50 82
           C 82 58, 130 52, 172 66
           C 196 74, 212 76, 224 72
           C 214 82, 196 88, 172 86
           C 140 84, 106 96, 82 94
           C 66 92, 54 88, 50 82 Z"
        fill="url(#flowHighlight)"/>
</svg>
