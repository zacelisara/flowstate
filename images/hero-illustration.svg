<svg viewBox="0 0 560 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glows -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#2563c7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4a0"/>
      <stop offset="100%" stop-color="#1aab7f"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f8ef7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2dd4a0" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background ambient glow -->
  <ellipse cx="280" cy="260" rx="240" ry="220" fill="url(#centerGlow)">
    <animate attributeName="rx" values="240;260;240" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="220;240;220" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Subtle grid dots in background -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect x="0" y="60" width="560" height="440" fill="url(#dots)"/>
  </g>

  <!-- ===== MESSY SIDE (Left - Tangled) ===== -->
  <!-- Tangled paths -->
  <g opacity="0.25">
    <path d="M60,140 C100,100 80,220 120,180 S90,300 130,260" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M40,200 C90,160 50,280 100,240 S80,340 120,310" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M70,270 C110,220 60,180 110,160 S90,120 130,130" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Scattered disconnected nodes (messy) -->
  <g opacity="0.5">
    <rect x="35" y="125" width="30" height="22" rx="4" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6" transform="rotate(-12, 50, 136)"/>
    <rect x="80" y="170" width="30" height="22" rx="4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6" transform="rotate(8, 95, 181)"/>
    <rect x="25" y="230" width="30" height="22" rx="4" fill="none" stroke="#f87171" stroke-width="1" opacity="0.6" transform="rotate(-5, 40, 241)"/>
    <rect x="90" y="280" width="30" height="22" rx="4" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6" transform="rotate(15, 105, 291)"/>
    <rect x="50" y="320" width="30" height="22" rx="4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6" transform="rotate(-8, 65, 331)"/>
    <text x="55" y="140" font-size="10" fill="#fb923c" opacity="0.5">⚠</text>
    <text x="100" y="188" font-size="10" fill="#a78bfa" opacity="0.5">✕</text>
    <text x="40" y="248" font-size="10" fill="#f87171" opacity="0.5">⚠</text>
  </g>

  <!-- "BEFORE" label -->
  <text x="65" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#8a909c" letter-spacing="1.5" text-anchor="middle" opacity="0.6">BEFORE</text>

  <!-- ===== TRANSFORMATION HUB (Center) ===== -->
  <g transform="translate(260, 260)">
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="28" fill="#0d0f12" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="1" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#4f8ef7" text-anchor="middle" dominant-baseline="middle">SI</text>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="r" values="28;55" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="r" values="28;55" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flow lines: Left mess → Center hub -->
  <g opacity="0.6">
    <path d="M120,150 Q180,180 215,245" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M120,240 Q170,250 215,258" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M120,330 Q180,310 218,275" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Flow lines: Center hub → Right clean nodes -->
  <g opacity="0.8">
    <path d="M305,242 Q345,170 385,130" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M312,260 Q355,260 385,260" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M305,278 Q345,350 385,390" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== CLEAN SIDE (Right - Organized) ===== -->
  <!-- "AFTER" label -->
  <text x="445" y="68" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#2dd4a0" letter-spacing="1.5" text-anchor="middle" opacity="0.7">AFTER</text>

  <!-- Clean Node 1: Workflow — y=90, spaced 130px apart -->
  <g transform="translate(395, 90)" filter="url(#glow)">
    <rect x="0" y="0" width="100" height="64" rx="12" fill="#13161b" stroke="#2dd4a0" stroke-width="1.5"/>
    <!-- Branching flow icon -->
    <g transform="translate(50, 24)" opacity="0.85">
      <circle cx="0" cy="0" r="4" fill="none" stroke="#2dd4a0" stroke-width="1.2"/>
      <line x1="4" y1="-2" x2="16" y2="-10" stroke="#2dd4a0" stroke-width="1" opacity="0.7"/>
      <line x1="4" y1="2" x2="16" y2="10" stroke="#2dd4a0" stroke-width="1" opacity="0.7"/>
      <circle cx="19" cy="-12" r="3" fill="none" stroke="#2dd4a0" stroke-width="1"/>
      <circle cx="19" cy="12" r="3" fill="none" stroke="#2dd4a0" stroke-width="1"/>
      <line x1="-4" y1="0" x2="-14" y2="0" stroke="#2dd4a0" stroke-width="1" opacity="0.7"/>
      <circle cx="-17" cy="0" r="3" fill="none" stroke="#2dd4a0" stroke-width="1"/>
    </g>
    <text x="50" y="52" font-family="-apple-system, sans-serif" font-size="9" fill="#2dd4a0" text-anchor="middle" opacity="0.85">Workflow</text>
    <rect x="0" y="0" width="100" height="64" rx="12" fill="none" stroke="#2dd4a0" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Clean Node 2: Systems — y=228 -->
  <g transform="translate(395, 228)" filter="url(#glow)">
    <rect x="0" y="0" width="100" height="64" rx="12" fill="#13161b" stroke="#4f8ef7" stroke-width="1.5"/>
    <!-- Interlocked rings / connected system icon -->
    <g transform="translate(50, 24)" opacity="0.85">
      <rect x="-20" y="-10" width="16" height="12" rx="3" fill="none" stroke="#4f8ef7" stroke-width="1.2"/>
      <rect x="-4" y="-6" width="16" height="12" rx="3" fill="none" stroke="#4f8ef7" stroke-width="1.2"/>
      <line x1="12" y1="0" x2="18" y2="0" stroke="#4f8ef7" stroke-width="1" opacity="0.6"/>
      <circle cx="21" cy="0" r="3" fill="none" stroke="#4f8ef7" stroke-width="1"/>
      <line x1="-20" y1="-4" x2="-26" y2="-4" stroke="#4f8ef7" stroke-width="1" opacity="0.6"/>
      <circle cx="-29" cy="-4" r="3" fill="none" stroke="#4f8ef7" stroke-width="1"/>
    </g>
    <text x="50" y="52" font-family="-apple-system, sans-serif" font-size="9" fill="#4f8ef7" text-anchor="middle" opacity="0.85">Systems</text>
    <rect x="0" y="0" width="100" height="64" rx="12" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Clean Node 3: Automation — y=366 -->
  <g transform="translate(395, 366)" filter="url(#glow)">
    <rect x="0" y="0" width="100" height="64" rx="12" fill="#13161b" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Gear + circular arrow icon -->
    <g transform="translate(50, 22)" opacity="0.85">
      <!-- Gear teeth suggested by octagon -->
      <polygon points="0,-11 5,-9 9,-5 11,0 9,5 5,9 0,11 -5,9 -9,5 -11,0 -9,-5 -5,-9" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4.5" fill="none" stroke="#a78bfa" stroke-width="1"/>
      <!-- Circular arrow around gear -->
      <path d="M15,0 A15,15 0 1,1 0,-15" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
      <polygon points="0,-15 3,-11 -3,-11" fill="#a78bfa" opacity="0.6"/>
    </g>
    <text x="50" y="52" font-family="-apple-system, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle" opacity="0.85">Automation</text>
    <rect x="0" y="0" width="100" height="64" rx="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Connections between clean nodes (vertical links) -->
  <g opacity="0.4">
    <line x1="445" y1="154" x2="445" y2="228" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="445" y1="292" x2="445" y2="366" stroke="#4f8ef7" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Checkmark indicators — pushed further right with more spacing -->
  <g opacity="0.7">
    <circle cx="510" cy="122" r="9" fill="rgba(45,212,160,0.15)" stroke="#2dd4a0" stroke-width="1"/>
    <polyline points="506,122 509,125 514,119" fill="none" stroke="#2dd4a0" stroke-width="1.5"/>

    <circle cx="510" cy="260" r="9" fill="rgba(79,142,247,0.15)" stroke="#4f8ef7" stroke-width="1"/>
    <polyline points="506,260 509,263 514,257" fill="none" stroke="#4f8ef7" stroke-width="1.5"/>

    <circle cx="510" cy="398" r="9" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
    <polyline points="506,398 509,401 514,395" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <!-- Floating particles -->
  <g>
    <circle cx="0" cy="0" r="2" fill="#4f8ef7" opacity="0.6" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite" path="M150,220 Q200,200 250,240 Q280,260 260,260"/>
    </circle>
    <circle cx="0" cy="0" r="2" fill="#2dd4a0" opacity="0.6" filter="url(#glow)">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M290,250 Q340,180 420,130 Q450,115 445,122"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#a78bfa" opacity="0.5" filter="url(#glow)">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M290,270 Q350,340 420,390 Q450,400 445,398"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#4f8ef7" opacity="0.4" filter="url(#glow)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M100,300 Q160,280 220,265"/>
    </circle>
  </g>
</svg>
